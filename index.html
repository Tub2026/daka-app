<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>每享 · 学习打卡</title>
  <style>
    :root {
      --bg: #f3fbf6;
      --card: #ffffff;
      --text: #17322a;
      --muted: #5f766d;
      --primary: #2f9e64;
      --primary-dark: #22774a;
      --accent: #8ce3ad;
      --border: #dcefe4;
      --danger: #ef4444;
      --shadow: 0 16px 36px rgba(47, 158, 100, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: linear-gradient(135deg, #f7fff9 0%, #eefbf3 100%);
      color: var(--text);
    }

    .app-shell {
      max-width: 860px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .hero {
      text-align: center;
      margin-bottom: 20px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 2rem;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }

    .form-grid {
      display: grid;
      gap: 14px;
    }

    .field-label {
      font-size: 0.95rem;
      color: var(--muted);
      font-weight: 600;
    }

    textarea {
      width: 100%;
      min-height: 110px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      resize: vertical;
      font-size: 1rem;
      font-family: inherit;
      background: #fcfffd;
      color: var(--text);
    }

    textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(47, 158, 100, 0.15);
    }

    .mood-list {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .mood-option {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      cursor: pointer;
      background: #f8fdf9;
      color: var(--muted);
    }

    .mood-option input { accent-color: var(--primary); }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .primary-button {
      border: none;
      border-radius: 999px;
      padding: 13px 16px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(47, 158, 100, 0.19);
    }

    .primary-button:disabled {
      opacity: 0.75;
      cursor: wait;
      box-shadow: none;
    }

    .message {
      min-height: 24px;
      margin-top: 8px;
      color: var(--primary-dark);
      font-size: 0.95rem;
    }

    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .list-header h2 {
      margin: 0;
      font-size: 1.1rem;
    }

    .record-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 10px;
    }

    .record-item {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      background: #fcfffd;
    }

    .record-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .record-time {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .mood-pill {
      display: inline-block;
      padding: 5px 8px;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--primary-dark);
      background: rgba(47, 158, 100, 0.12);
    }

    .record-content {
      white-space: pre-wrap;
      line-height: 1.7;
      margin-bottom: 10px;
    }

    .delete-btn {
      border: none;
      background: transparent;
      color: var(--danger);
      cursor: pointer;
      font-size: 0.95rem;
      padding: 0;
    }

    .empty-state {
      text-align: center;
      padding: 24px 10px;
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: 16px;
      background: #fbfffc;
    }

    @media (max-width: 640px) {
      .app-shell { padding: 16px 12px 32px; }
      .hero h1 { font-size: 1.75rem; }
      .primary-button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <h1>每享</h1>
      <p>把今天的学习进度和心情，轻轻记下来。让坚持变得更有仪式感。</p>
    </header>

    <section class="card">
      <div class="meta-row">
        <span>今天的学习打卡</span>
        <span id="clockText">正在获取时间…</span>
      </div>
      <form id="checkinForm" class="form-grid">
        <label class="field-label" for="contentInput">写下今天完成的学习内容</label>
        <textarea id="contentInput" placeholder="例如：复习了 2 章数学公式，完成 20 道练习题。"></textarea>

        <div>
          <div class="field-label">今天的心情</div>
          <div class="mood-list">
            <label class="mood-option"><input type="radio" name="mood" value="开心" checked /> 开心</label>
            <label class="mood-option"><input type="radio" name="mood" value="一般" /> 一般</label>
            <label class="mood-option"><input type="radio" name="mood" value="难过" /> 难过</label>
          </div>
        </div>

        <button class="primary-button" id="submitButton" type="submit">记录今天</button>
        <div id="feedbackMessage" class="message"></div>
      </form>
    </section>

    <section class="card">
      <div class="list-header">
        <h2>打卡记录</h2>
        <span id="recordCount">0 条记录</span>
      </div>
      <ul id="recordList" class="record-list"></ul>
    </section>
  </div>

  <script>
    const STORAGE_KEY = "study-checkin-records-v1";
    const form = document.getElementById("checkinForm");
    const contentInput = document.getElementById("contentInput");
    const submitButton = document.getElementById("submitButton");
    const feedbackMessage = document.getElementById("feedbackMessage");
    const recordList = document.getElementById("recordList");
    const recordCount = document.getElementById("recordCount");
    const clockText = document.getElementById("clockText");

    let records = [];
    let storageAvailable = true;
    let submitting = false;

    function updateClock() {
      const now = new Date();
      clockText.textContent = now.toLocaleString("zh-CN", {
        month: "numeric",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function loadRecords() {
      try {
        const raw = window.localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch (error) {
        storageAvailable = false;
        return [];
      }
    }

    function saveRecords() {
      if (!storageAvailable) {
        feedbackMessage.textContent = "当前浏览器无法保存数据，但你仍然可以继续使用。";
        return;
      }

      try {
        window.localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
      } catch (error) {
        storageAvailable = false;
        feedbackMessage.textContent = "当前浏览器无法保存数据，但本次记录已显示。";
      }
    }

    function formatTime(value) {
      const date = new Date(value);
      return date.toLocaleString("zh-CN", {
        year: "numeric",
        month: "numeric",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function renderRecords() {
      recordCount.textContent = `${records.length} 条记录`;

      if (!records.length) {
        recordList.innerHTML = '<li class="empty-state">还没有记录，先写下今天的学习内容吧。</li>';
        return;
      }

      recordList.innerHTML = "";
      const ordered = [...records].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

      ordered.forEach((item) => {
        const li = document.createElement("li");
        li.className = "record-item";
        li.innerHTML = `
          <div class="record-top">
            <div class="record-time">${formatTime(item.createdAt)}</div>
            <span class="mood-pill">${item.mood}</span>
          </div>
          <div class="record-content">${item.content}</div>
          <button class="delete-btn" type="button" data-id="${item.id}">删除</button>
        `;
        recordList.appendChild(li);
      });
    }

    function setSubmitting(state) {
      submitting = state;
      submitButton.disabled = state;
      submitButton.textContent = state ? "记录中..." : "记录今天";
    }

    function handleSubmit(event) {
      event.preventDefault();
      if (submitting) return;

      const content = contentInput.value.trim();
      const mood = document.querySelector('input[name="mood"]:checked')?.value || "一般";

      if (!content) {
        feedbackMessage.textContent = "请先写下今天的学习内容。";
        contentInput.focus();
        return;
      }

      setSubmitting(true);
      const newRecord = {
        id: Date.now().toString(),
        content,
        mood,
        createdAt: new Date().toISOString()
      };

      records.unshift(newRecord);
      saveRecords();
      renderRecords();
      form.reset();
      document.querySelector('input[name="mood"][value="开心"]').checked = true;
      feedbackMessage.textContent = "打卡成功，继续保持学习节奏。";

      window.setTimeout(() => {
        setSubmitting(false);
      }, 400);
    }

    function handleDelete(event) {
      const button = event.target.closest(".delete-btn");
      if (!button) return;

      const id = button.getAttribute("data-id");
      records = records.filter((item) => item.id !== id);
      saveRecords();
      renderRecords();
      feedbackMessage.textContent = "记录已删除。";
    }

    records = loadRecords();
    updateClock();
    renderRecords();

    form.addEventListener("submit", handleSubmit);
    recordList.addEventListener("click", handleDelete);
    window.setInterval(updateClock, 60000);
  </script>
</body>
</html>
